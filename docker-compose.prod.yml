services:
  backend:
    build:
      context: ./server
      dockerfile: Dockerfile
    container_name: attendance-backend
    restart: unless-stopped
    expose:
      - "3001"
    volumes:
      - sqlite_data:/data
    environment:
      - PORT=3001
      - DATA_DIR=/data
      - APP_USERNAME=${APP_USERNAME:-admin}
      - APP_PASSWORD=${APP_PASSWORD:-change-me-in-production}
      - CORS_ORIGIN=${CORS_ORIGIN:-*}
    healthcheck:
      test: ["CMD", "wget", "-qO-", "http://localhost:3001/api/health"]
      interval: 10s
      timeout: 5s
      retries: 3

  frontend:
    build:
      context: .
      dockerfile: Dockerfile
    container_name: attendance-frontend
    restart: unless-stopped
    depends_on:
      backend:
        condition: service_healthy
    ports:
      - "8080:80"

volumes:
  sqlite_data:
    driver: local
