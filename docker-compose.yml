services:
  backend:
    build:
      context: ./server
      dockerfile: Dockerfile
    container_name: attendance-backend
    restart: unless-stopped
    ports:
      - "3001:3001"
    volumes:
      - sqlite_data:/data
    environment:
      - PORT=3001
      - DATA_DIR=/data
    healthcheck:
      test: ["CMD", "wget", "-qO-", "http://localhost:3001/api/health"]
      interval: 10s
      timeout: 5s
      retries: 3

volumes:
  sqlite_data:
    driver: local
